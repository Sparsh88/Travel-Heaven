<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login | Travel Heaven</title>
  <meta name="description" content="Sign in to your Travel Heaven account to manage bookings and track your trips.">
  <link rel="stylesheet" href="css/style.css">
  <script>
    (function() {
      const t = localStorage.getItem('th-theme') || 'light';
      document.documentElement.setAttribute('data-theme', t);
    })();
  </script>
  <style>
    .auth-page {
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background: linear-gradient(rgba(11, 12, 16, 0.4), rgba(15, 52, 96, 0.5)), url('https://images.unsplash.com/photo-1506013013546-f401a0e17676?auto=format&fit=crop&w=1200&q=80') no-repeat center center/cover;
      padding: 40px 24px;
      position: relative;
      overflow: hidden;
      z-index: 1;
    }

    .auth-card {
      width: 100%;
      max-width: 450px;
    }

    .auth-card h2 {
      font-size: 28px;
      margin-bottom: 8px;
      text-align: center;
      color: var(--primary);
    }

    .auth-card p {
      text-align: center;
      color: var(--text-muted);
      font-size: 14px;
      margin-bottom: 30px;
    }

    .form-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-bottom: 20px;
    }

    .form-group label {
      font-size: 13px;
      font-weight: 600;
      color: var(--primary);
    }

    .form-group input {
      padding: 12px 18px;
      border-radius: 10px;
      border: 1px solid rgba(0,0,0,0.1);
      outline: none;
      font-size: 14px;
      background: rgba(255,255,255,0.8);
      transition: var(--transition);
    }

    .form-group input:focus {
      border-color: var(--secondary);
      background: var(--white);
      box-shadow: 0 0 0 3px rgba(255, 122, 0, 0.1);
    }

    .form-options {
      display: flex;
      justify-content: space-between;
      align-items: center;
      font-size: 13px;
      margin-bottom: 25px;
    }

    .checkbox-container {
      display: flex;
      align-items: center;
      gap: 8px;
      cursor: pointer;
    }

    .checkbox-container input {
      width: 16px;
      height: 16px;
      accent-color: var(--secondary);
    }

    .forgot-link {
      color: var(--secondary);
      font-weight: 600;
    }

    .forgot-link:hover {
      text-decoration: underline;
    }
  </style>
</head>
<body>

  <!-- Page Loader -->
  <div class="loader-wrapper" id="loader">
    <div class="loader"></div>
  </div>

  <div class="auth-page">
    <video autoplay loop muted playsinline class="hero-video-bg">
      <source src="https://assets.mixkit.co/videos/preview/mixkit-beautiful-aerial-view-of-a-mountain-valley-41951-large.mp4" type="video/mp4">
    </video>
    <div class="hero-overlay" style="background: linear-gradient(rgba(11, 12, 16, 0.4), rgba(15, 52, 96, 0.5));"></div>
    <div class="glass-card auth-card animate-fade-in">
      
      <!-- Back Home Logo -->
      <div style="text-align: center; margin-bottom: 20px;">
        <a href="index.html" class="logo" style="justify-content: center;">
          <img src="images/logo.png" alt="Travel Heaven Logo">
          <span style="font-size: 20px;">Travel Heaven</span>
        </a>
      </div>

      <h2>Welcome Back</h2>
      <p>Sign in to manage your bookings and track trips</p>

      <form id="login-form" onsubmit="handleLogin(event)">
        <div class="form-group">
          <label>Email Address</label>
          <input type="email" id="login-email" placeholder="john@example.com" required>
        </div>
        <div class="form-group">
          <label>Password</label>
          <input type="password" id="login-password" placeholder="••••••••" required>
        </div>

        <div class="form-options">
          <label class="checkbox-container">
            <input type="checkbox" id="login-remember">
            <span>Remember Me</span>
          </label>
          <a href="forgot-password.html" class="forgot-link">Forgot Password?</a>
        </div>

        <button type="submit" class="btn btn-primary" style="width: 100%; padding: 14px;">Sign In</button>
      </form>

      <div style="text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-dark);">
        Don't have an account? <a href="register.html" style="color: var(--secondary); font-weight: 700;">Sign Up</a>
      </div>
      
      <div style="text-align: center; margin-top: 15px; font-size: 13px;">
        <a href="admin.html" style="color: var(--primary-light); font-weight: 500; text-decoration: underline;">Are you an Admin?</a>
      </div>
    </div>
  </div>

  <!-- Scripts -->
  <script src="js/main.js"></script>
  <script>
    // Redirect if already logged in
    document.addEventListener('DOMContentLoaded', () => {
      if (localStorage.getItem('token')) {
        window.location.href = 'dashboard.html';
      }
    });

    async function handleLogin(e) {
      e.preventDefault();

      const email = document.getElementById('login-email').value;
      const password = document.getElementById('login-password').value;
      const rememberMe = document.getElementById('login-remember').checked;

      try {
        const res = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json'
          },
          body: JSON.stringify({ email, password, rememberMe })
        });
        const json = await res.json();

        if (json.success) {
          showAlert('Login successful! Redirecting...', 'success');
          
          // Save credentials
          localStorage.setItem('token', json.token);
          localStorage.setItem('user', JSON.stringify(json.user));

          // Save rememberMe flag
          if (rememberMe) {
            localStorage.setItem('rememberUser', email);
          } else {
            localStorage.removeItem('rememberUser');
          }

          // Redirect to target booking page or default dashboard
          setTimeout(() => {
            const redirect = localStorage.getItem('redirectAfterLogin');
            if (redirect) {
              localStorage.removeItem('redirectAfterLogin');
              window.location.href = redirect;
            } else {
              window.location.href = 'dashboard.html';
            }
          }, 1200);
        } else {
          showAlert(json.message || 'Invalid email or password', 'error');
        }
      } catch (err) {
        showAlert('Error connecting to authentication servers.', 'error');
      }
    }
  </script>
</body>
</html>
